<!-- camp-list.component.html -->
<div class="container">
  <h1 class="page-title">Nyári Táborok</h1>
  <h2>Elérhető Táborok</h2>
  <div class="camp-list">
    <app-camp-card *ngFor="let camp of camps" [camp]="camp" (bookNow)="navigateToBooking($event)">
    </app-camp-card>
    <ul>
      <li *ngFor="let camp of camps">{{ camp.name }} - {{ camp.location }}</li>
      <mat-card *ngFor="let camp of camps" fxLayout="column" fxLayoutGap="10px">
        <mat-card-title>{{ camp.nev }}</mat-card-title>
        <mat-card-content>
          <p>Helyszín: {{ camp.location }}</p>
          <p>Dátum: {{ camp.date | date }}</p>
          <p>Férőhely: {{ camp.capacity }}</p>
        </mat-card-content>
      </mat-card>
    </ul>
  </div>
  <!-- Gyermek komponens meghívása, adatátadás + eseménykezelés -->
  <app-camp-details [campName]="selectedCamp.name" [capacity]="selectedCamp.capacity"
    [isAvailable]="selectedCamp.available" (reserve)="onReserveCamp()" (cancelReservation)="onCancelReservation($event)"
    (logView)="onCampViewed($event)">
  </app-camp-details>
</div>
