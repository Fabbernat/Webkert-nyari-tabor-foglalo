<!-- features/registration/components/registration-form/registration-form.component.html -->
<div class="registration-container" *ngIf="camp$ | async as camp">
    <h1>Jelentkezés a {{ camp.name }} táborba</h1>
    
    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
      <div formArrayName="children">
        <h2>Gyermekek adatai</h2>
        
        <div *ngFor="let child of children.controls; let i = index" [formGroupName]="i" class="child-form">
          <mat-form-field appearance="fill">
            <mat-label>Gyermek neve</mat-label>
            <input matInput formControlName="name" required>
          </mat-form-field>
          
          <mat-form-field appearance="fill">
            <mat-label>Születési dátum</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="birthDate" required>
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
          
          <mat-form-field appearance="fill">
            <mat-label>Egészségügyi információk</mat-label>
            <textarea matInput formControlName="medicalInfo" rows="3"></textarea>
          </mat-form-field>
          
          <button mat-button color="warn" (click)="removeChild(i)" *ngIf="children.controls.length > 1">Eltávolítás</button>
        </div>
        
        <button mat-button color="primary" (click)="addChild()" type="button">Új gyermek hozzáadása</button>
      </div>
      
      <div *ngIf="auth.userData.role === 'educator'">
        <h2>Kísérő felnőttek száma</h2>
        <mat-form-field appearance="fill">
          <mat-label>Felnőttek száma</mat-label>
          <input matInput type="number" formControlName="adults" min="0">
        </mat-form-field>
      </div>
      
      <div *ngIf="hasOver16Children()">
        <h2>Beleegyező nyilatkozat</h2>
        <p>Mivel van 16 év feletti gyermeke, kérjük töltse fel a beleegyező nyilatkozatot!</p>
        <input type="file" (change)="uploadConsentForm($event)">
      </div>
      
      <button mat-raised-button color="primary" type="submit" [disabled]="!registrationForm.valid">Jelentkezés</button>
    </form>
  </div>
