<!-- features/camps/components/camp-list/camp-list.component.html -->
<div class="camp-list-container">
    <h1>Táborok listája</h1>
    
    <mat-grid-list cols="3" rowHeight="350px" gutterSize="20px">
      <mat-grid-tile *ngFor="let camp of camps$ | async">
        <mat-card class="camp-card">
          <mat-card-header>
            <mat-card-title>{{ camp.name }}</mat-card-title>
            <mat-card-subtitle>{{ camp.type | campType }}</mat-card-subtitle>
          </mat-card-header>
          <img mat-card-image [src]="getCampImage(camp.type)" alt="{{ camp.name }}">
          <mat-card-content>
            <p>{{ camp.startDate | date }} - {{ camp.endDate | date }}</p>
            <p>{{ camp.location }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary" [routerLink]="['/camps', camp.id]">Részletek</button>
            <button mat-button *ngIf="auth.isLoggedIn" (click)="registerForCamp(camp.id)">Jelentkezés</button>
          </mat-card-actions>
        </mat-card>
      </mat-grid-tile>
    </mat-grid-list>
  </div>
